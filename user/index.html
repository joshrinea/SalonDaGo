<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SalonDaGo</title>

    <link rel="shortcut icon" href="https://cdn.onlinewebfonts.com/svg/img_412894.png" type="image/x-icon">
    <link href='https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">

    <!-- FIREBASE LIBRARIES -->
    <script src="https://www.gstatic.com/firebasejs/8.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.8.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.8.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.8.0/firebase-analytics.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.8.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.8.0/firebase-storage.js"></script>
    
</head>
<body>

    <section>
        <div class="container">
            <!-- login box -->
            <div class="user signinBox">
                <div class="imgBox">
                    <img src="https://images.unsplash.com/photo-1560869713-7d0a29430803?ixlib=rb-1.2.1&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=326&q=80" alt="SalonDaGo">
                </div>
                <div class="formBox">
                    <form action="#">
                        <h2>Signin</h2>
                        <input type="email" id="signin-email" placeholder="Email" required>
                        <input type="password" id="signin-password" placeholder="Password" required>
                        <button type="button">Login</button>
                        <p class="forgot-pass">
                            <a href="#">Forgot Password?</a>
                        </p>
                        <p class="singup">
                            Don`t have an account ?
                            <a href="#" onclick="toggleForm();">Sign Up.</a>
                        </p>
                    </form>
                </div>
            </div>

            <!-- signup box -->
            <div class="user signupBox">
                <div class="formBox">
                    <form action="#">
                        <h2>Create an Account</h2>
                        <input type="text" id="signup-first-name" placeholder="First name" style="text-transform: capitalize;" required>
                        <input type="text" id="signup-last-name" placeholder="Last name" style="text-transform: capitalize;" required>
                        <input type="tel" id="signup-mobile" placeholder="Mobile" required>
                        <input type="email" id="signup-email" placeholder="Email" required>
                        <input type="password" id="signup-password" placeholder="Password" required>
                        <button type="button" id="signup-button">Sign up</button>
                        <p class="singup">
                            Already have an account ?
                            <a href="#" onclick="toggleForm();">Login.</a>
                        </p>
                    </form>
                </div>
                <div class="imgBox">
                    <img src="https://images.unsplash.com/photo-1631451497670-c7fc917197cd?ixlib=rb-1.2.1&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1374&q=80" alt="SalonDaGo">
                </div>
            </div>
        </div>
    </section>

    <script src="main.js" id="main" type="module"></script>
    <script>
        function toggleForm(){
            var container = document.querySelector('.container');
            container.classList.toggle('active');
        }
    </script>
    
    
</body>
</html>
